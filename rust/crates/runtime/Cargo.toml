[package]
name = "runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[features]
acp-sdk = [
    "dep:agent-client-protocol",
    "dep:agent-client-protocol-schema",
    "dep:agent-client-protocol-tokio",
]

[dependencies]
agent-client-protocol = { workspace = true, optional = true }
agent-client-protocol-schema = { workspace = true, optional = true }
agent-client-protocol-tokio = { workspace = true, optional = true }
sha2 = "0.10"
glob = "0.3"
keyring = "3"
plugins = { path = "../plugins" }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json.workspace = true
telemetry = { path = "../telemetry" }
tokio = { version = "1", features = ["io-std", "io-util", "macros", "process", "rt", "rt-multi-thread", "time"] }
walkdir = "2"

[lints]
workspace = true
